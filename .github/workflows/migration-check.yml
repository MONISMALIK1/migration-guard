name: Migration Safety Check

on:
  pull_request:
    paths:
      - 'migrations/**'
      - '**/migrations/**'
      - '**/*migration*.sql'
      - '**/*migrate*.sql'

jobs:
  migration-guard:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install migration-guard
        run: pip install .   # from the checked-out source (not yet on PyPI)

      - name: Check migrations
        run: |
          migration-guard scan migrations/ \
            --fail-on high \
            --json-report migration-report.json \
            --verbose

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-guard-report
          path: migration-report.json
